<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LEGO Star Wars III - The Clone Wars Beta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        ruffle-player {
            display: block;
            width: 960px !important;
            height: 660px !important;
            transform-origin: top left;
            transform: scale(var(--scale));
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", function() {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            player.style.width = "960px";
            player.style.height = "660px";
            document.body.appendChild(player);
player.load({
    url: "GalaxyLoader.swf",
    parameters: { config: "xml/config.xml" },
    scale: "exactFit",
    quality: "high",
    allowFullscreen: false,
    autoplay: "auto"
});
            updateScale();
        });

        function updateScale() {
            const scaleX = window.innerWidth / 960;
            const scaleY = window.innerHeight / 660;
            const scale = Math.min(scaleX, scaleY);
            document.documentElement.style.setProperty('--scale', scale);
            const player = document.querySelector('ruffle-player');
            if (player) {
                player.style.marginLeft = ((window.innerWidth - 960 * scale) / 2) + 'px';
                player.style.marginTop = ((window.innerHeight - 660 * scale) / 2) + 'px';
            }
        }

        window.addEventListener('resize', updateScale);
        window.addEventListener('load', updateScale);
    </script>
</body>
</html>
